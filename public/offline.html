<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ParkFlow Offline</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        background: #0b1220;
        color: #f3f6fb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top right, rgba(255, 184, 61, 0.16), transparent 30%),
          radial-gradient(circle at bottom left, rgba(28, 145, 255, 0.12), transparent 35%),
          #0b1220;
        padding: 24px;
      }

      main {
        width: min(100%, 520px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 32px;
        background: rgba(18, 26, 38, 0.92);
        box-shadow: 0 24px 60px rgba(5, 10, 19, 0.35);
        padding: 32px;
      }

      h1 {
        margin: 12px 0 0;
        font-size: clamp(2rem, 5vw, 3rem);
        line-height: 0.95;
      }

      p {
        margin: 16px 0 0;
        color: rgba(243, 246, 251, 0.76);
        line-height: 1.6;
      }

      strong {
        display: block;
        font-size: 0.75rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #ffb83d;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>Modo offline</strong>
      <h1>Sem conexão no momento.</h1>
      <p>
        O ParkFlow continua disponível para operações locais já abertas, mas esta navegação precisa
        que a internet volte para carregar a versão mais recente.
      </p>
    </main>
  </body>
</html>
